name: Build and deploy documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandoc (required by nbsphinx)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pandoc

      - name: Install package and doc dependencies
        run: python -m pip install --upgrade pip && pip install ".[docs]"

      - name: Debug - list installed packages
        run: pip list

      - name: Build Sphinx documentation
        run: python -m sphinx -b html docs _build/html

      - name: Disable Jekyll processing
        run: touch _build/html/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
